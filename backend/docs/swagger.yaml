info:
  contact: {}
  description: api for smart dairy cows
  title: smart dairy api
  version: "1.0"
paths:
  /api/alert/list:
    get:
      description: get paged alert list
      parameters:
      - default: 1
        description: page numb
        in: query
        name: page
        type: integer
      - default: 20
        description: page size
        in: query
        name: page_size
        type: integer
      - description: Cow ID
        in: query
        name: cow_id
        type: string
      - description: alert level
        in: query
        name: severity
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_zcl0621_compx576-smart-dairy-system_dto_alert.ListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/runtime_web_server_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/runtime_web_server_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/runtime_web_server_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: list alerts
      tags:
      - Alert
  /api/alert/summary:
    get:
      description: get active alert counts
      produces:
      - application/json
      responses:
        "200":
